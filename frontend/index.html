<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <!-- 默认 favicon（Sun Panel 图标，内联 SVG，无需外部文件） -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%234a90d9'/%3E%3Cstop offset='100%25' style='stop-color:%23357abd'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='32' fill='none' stroke='white' stroke-width='3' opacity='0.9'/%3E%3Ccircle cx='50' cy='50' r='4' fill='white'/%3E%3Cline x1='50' y1='18' x2='50' y2='14' stroke='white' stroke-width='3' stroke-linecap='round' opacity='0.8'/%3E%3C/svg%3E" />
    <!-- iOS Safari 添加到主屏幕图标 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%234a90d9'/%3E%3Cstop offset='100%25' style='stop-color:%23357abd'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='32' fill='none' stroke='white' stroke-width='3' opacity='0.9'/%3E%3Ccircle cx='50' cy='50' r='4' fill='white'/%3E%3Cline x1='50' y1='18' x2='50' y2='14' stroke='white' stroke-width='3' stroke-linecap='round' opacity='0.8'/%3E%3C/svg%3E" />
    <!-- Safari 固定标签页图标 -->
    <link rel="mask-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%234a90d9'/%3E%3Cstop offset='100%25' style='stop-color:%23357abd'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='32' fill='none' stroke='white' stroke-width='3' opacity='0.9'/%3E%3Ccircle cx='50' cy='50' r='4' fill='white'/%3E%3Cline x1='50' y1='18' x2='50' y2='14' stroke='white' stroke-width='3' stroke-linecap='round' opacity='0.8'/%3E%3C/svg%3E" color="#4a90d9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f0f0" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Sun-Panel</title>
    <!-- 资源预连接：减少外域资源连接时间 -->
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="preconnect" href="//fonts.googleapis.com" crossorigin />
    <!-- 预连接当前域名（API / 图片资源同源） -->
    <link rel="preconnect" crossorigin />

    <style>
        /* 使用系统字体栈替代 Google Fonts，消除外部字体加载阻塞 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue",
                         Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>

    <!-- 站点标题 & favicon + 壁纸预加载：在 Vue 挂载前立即触发 -->
    <script>
    (function() {
      // ===== 1. 站点标题和 favicon 预注入 =====
      try {
        var siteConfigRaw = localStorage.getItem('sun-panel-site-config');
        if (siteConfigRaw) {
          var siteConfig = JSON.parse(siteConfigRaw);
          if (siteConfig.site_title) {
            document.title = siteConfig.site_title;
          }
          if (siteConfig.favicon_url) {
            var timestamp = '_t=' + Date.now();
            var favUrl = siteConfig.favicon_url;
            var sep = favUrl.indexOf('?') > -1 ? '&' : '?';
            var favWithTs = favUrl + sep + timestamp;

            var iconLink = document.querySelector('link[rel="icon"]');
            if (iconLink) iconLink.href = favWithTs;

            var appleLink = document.querySelector('link[rel="apple-touch-icon"]');
            if (appleLink) appleLink.href = favWithTs;

            var maskLink = document.querySelector('link[rel="mask-icon"]');
            if (maskLink) maskLink.href = favWithTs;
          }
        }
      } catch(e) {}

      // ===== 2. 壁纸预加载 =====
      var key = 'sun-panel-effective-wallpaper';
      var wallpaper = localStorage.getItem(key);
      if (!wallpaper) return;

      // 1. <link rel="preload"> 触发浏览器预加载
      var link = document.createElement('link');
      link.rel = 'preload';
      link.as = 'image';
      link.href = wallpaper;
      link.setAttribute('data-wallpaper', 'true');
      document.head.appendChild(link);

      // 2. 外部域名添加 preconnect，节省 TLS/连接时间
      try {
        var url = new URL(wallpaper);
        if (url.hostname !== location.hostname) {
          var pc = document.createElement('link');
          pc.rel = 'preconnect';
          pc.href = url.origin;
          pc.crossOrigin = 'anonymous';
          document.head.appendChild(pc);
        }
      } catch(e) {}
    })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
