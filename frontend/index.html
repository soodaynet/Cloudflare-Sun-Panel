<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f0f0" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Accept-CH" content="Sec-CH-Viewport-Width, Sec-CH-Viewport-Height" />
    <title></title>
    <!-- Google Favicon API 预连接（favicon-proxy 经 google s2 服务） -->
    <link rel="preconnect" href="https://t0.gstatic.cn" crossorigin />
    <link rel="dns-prefetch" href="https://t0.gstatic.cn" />

    <link rel="stylesheet" href="/early-bootstrap.css" />

    <!-- early-preload.js: 在 Vue 挂载前执行预加载逻辑（站点配置/壁纸/Logo/图标/搜索引擎图标） -->
    <script src="/early-preload.js"></script>
</head>
<body class="min-h-screen">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
