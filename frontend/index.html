<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f0f0" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Sun-Panel</title>

    <!-- 预连接到常见的图标 CDN 域名，提前完成 TLS 握手以加速图片加载 -->
    <link rel="preconnect" href="https://cloudflare-imgbed.sooday.dpdns.org" crossorigin />
    <link rel="preconnect" href="https://toolb.cn" crossorigin />
    <link rel="preconnect" href="https://ts4.tc.mm.bing.net" crossorigin />
    <link rel="dns-prefetch" href="https://cloudflare-imgbed.sooday.dpdns.org" />
    <link rel="dns-prefetch" href="https://toolb.cn" />
    <link rel="dns-prefetch" href="https://ts4.tc.mm.bing.net" />

    <style>
        /* 使用系统字体栈替代 Google Fonts，消除外部字体加载阻塞 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue",
                         Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
